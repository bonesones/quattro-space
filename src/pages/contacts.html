<section class="space-y-8 max-w-3xl">
  <div class="space-y-3">
    <h1 class="text-3xl font-semibold tracking-tight sm:text-4xl">
      Давайте обсудим ваш проект
    </h1>
    <p class="text-slate-300 text-sm sm:text-base">
      Коротко опишите задачу, дедлайны и желаемый формат взаимодействия — мы вернемся с
      предложением по подходу и срокам.
    </p>
  </div>

  <div class="grid gap-8 md:grid-cols-[2fr,1.2fr]">
    <form class="space-y-4">
      <div class="space-y-1">
        <label class="block text-sm font-medium text-slate-200">Имя</label>
        <input
          type="text"
          class="w-full rounded-xl border border-slate-700 bg-slate-900/60 px-3 py-2 text-sm text-slate-50 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500"
          placeholder="Как к вам обращаться"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm font-medium text-slate-200">Email или Telegram</label>
        <input
          type="text"
          class="w-full rounded-xl border border-slate-700 bg-slate-900/60 px-3 py-2 text-sm text-slate-50 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500"
          placeholder="contact@company.com или @username"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm font-medium text-slate-200">Кратко о задаче</label>
        <textarea
          rows="4"
          class="w-full rounded-xl border border-slate-700 bg-slate-900/60 px-3 py-2 text-sm text-slate-50 placeholder:text-slate-500 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500"
          placeholder="Формат проекта, сроки, цели, ссылки на референсы"
        ></textarea>
      </div>

      <button
        type="button"
        class="inline-flex items-center justify-center rounded-full bg-sky-500 px-5 py-2.5 text-sm font-medium text-slate-950 shadow-lg shadow-sky-500/30 hover:bg-sky-400 transition-colors"
      >
        Отправить запрос
      </button>

      <p class="text-xs text-slate-500">
        Форма сейчас демо — под MODX можно будет повесить обработчик и нужную логику.
      </p>
    </form>

    <div class="space-y-4 text-sm text-slate-300">
      <div>
        <p class="text-slate-400 text-xs uppercase tracking-wide mb-1">Email</p>
        <a href="mailto:hello@quattro-space.studio" class="hover:text-sky-300 transition-colors">
          hello@quattro-space.studio
        </a>
      </div>
      <div>
        <p class="text-slate-400 text-xs uppercase tracking-wide mb-1">Telegram</p>
        <a href="https://t.me/quattro-space" class="hover:text-sky-300 transition-colors">
          @quattro-space
        </a>
      </div>
    </div>
  </div>
</section>
